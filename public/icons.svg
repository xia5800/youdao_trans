<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <!-- 首页图标 - 房子 -->
    <symbol id="icon-home" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none">
        <path d="M3 9L12 3L21 9V20H3V9Z" stroke="currentColor" fill="none" />
        <path d="M9 20V12H15V20" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 词典图标 - 书本 -->
    <symbol id="icon-dictionary" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" fill="none">
        <path d="M4 19.5L9 20M4 4.5L9 5M9 20L15 18M9 5L15 3M15 18L20 19.5M15 3L20 4.5M5 8H7M5 12H8M5 16H7" stroke="currentColor" />
        <path d="M12 3V21" stroke="currentColor" />
    </symbol>

    <!-- 历史/记录图标 - 时钟 -->
    <symbol id="icon-history" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" />
        <polyline points="12 7 12 12 15 15" stroke="currentColor" fill="none" />
        <path d="M4 4L8 8" stroke="currentColor" />
        <path d="M20 4L16 8" stroke="currentColor" />
    </symbol>

    <!-- 设置图标 - 齿轮 -->
    <symbol id="icon-settings" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <circle cx="12" cy="12" r="3" stroke="currentColor" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" />
    </symbol>

    <!-- 折叠图标 - 双箭头 -->
    <symbol id="icon-collapse" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none">
        <path d="M11 19L4 12L11 5" stroke="currentColor" />
        <path d="M20 19L13 12L20 5" stroke="currentColor" />
    </symbol>

    <!-- 复制图标 -->
    <symbol id="icon-copy" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke="currentColor" fill="none" />
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 删除图标 -->
    <symbol id="icon-delete" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            stroke="currentColor" />
        <line x1="10" y1="11" x2="10" y2="17" stroke="currentColor" />
        <line x1="14" y1="11" x2="14" y2="17" stroke="currentColor" />
    </symbol>

    <!-- 朗读图标 -->
    <symbol id="icon-speaker" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke="currentColor" fill="none" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" fill="none" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 搜索图标 -->
    <symbol id="icon-search" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" fill="none" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" />
    </symbol>

    <!-- 对勾图标 -->
    <symbol id="icon-check" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <polyline points="20 6 9 17 4 12" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 箭头下拉图标 -->
    <symbol id="icon-arrow-down" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <polyline points="6 9 12 15 18 9" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 信息图标 -->
    <symbol id="icon-info" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" fill="none" />
        <line x1="12" y1="16" x2="12" y2="12" stroke="currentColor" />
        <line x1="12" y1="8" x2="12.01" y2="8" stroke="currentColor" />
    </symbol>

    <!-- 警告图标 -->
    <symbol id="icon-alert" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M12 7v6M12 17h.01" stroke="currentColor" stroke-linecap="round" />
        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 加减图标 - 展开/收起 -->
    <symbol id="icon-plus" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" />
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" />
    </symbol>

    <symbol id="icon-minus" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" />
    </symbol>

    <!-- 星星图标 -->
    <symbol id="icon-star" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 用户图标 -->
    <symbol id="icon-user" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" fill="none" />
        <circle cx="12" cy="7" r="4" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 锁图标 -->
    <symbol id="icon-lock" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" fill="none" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 刷新图标 -->
    <symbol id="icon-refresh" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M23 4v6h-6" stroke="currentColor" fill="none" />
        <path d="M1 20v-6h6" stroke="currentColor" fill="none" />
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 下载图标 -->
    <symbol id="icon-download" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" fill="none" />
        <polyline points="7 10 12 15 17 10" stroke="currentColor" fill="none" />
        <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" />
    </symbol>

    <!-- 上传图标 -->
    <symbol id="icon-upload" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" fill="none" />
        <polyline points="17 8 12 3 7 8" stroke="currentColor" fill="none" />
        <line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" />
    </symbol>

    <!-- 文件夹图标 -->
    <symbol id="icon-folder" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 图片图标 -->
    <symbol id="icon-image" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" stroke="currentColor" fill="none" />
        <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" />
        <polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 链接图标 -->
    <symbol id="icon-link" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" fill="none" />
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 邮件图标 -->
    <symbol id="icon-mail" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" fill="none" />
        <polyline points="22 7 12 13 2 7" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 更多菜单图标 -->
    <symbol id="icon-more" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <circle cx="12" cy="12" r="1" stroke="none" fill="currentColor" />
        <circle cx="19" cy="12" r="1" stroke="none" fill="currentColor" />
        <circle cx="5" cy="12" r="1" stroke="none" fill="currentColor" />
    </symbol>

    <!-- 眼睛睁开图标 -->
    <symbol id="icon-eye-open" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" fill="none" />
        <circle cx="12" cy="12" r="3" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 眼睛关闭图标 -->
    <symbol id="icon-eye-off" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" fill="none" />
        <circle cx="12" cy="12" r="3" stroke="currentColor" fill="none" />
        <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="1.5" />
    </symbol>

    <!-- 窗口控制 - 最小化 -->
    <symbol id="icon-minimize" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-linecap="round" />
    </symbol>

    <!-- 窗口控制 - 最大化 -->
    <symbol id="icon-maximize" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <rect x="4" y="4" width="16" height="16" rx="1.5" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 窗口控制 - 还原 -->
    <symbol id="icon-restore" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <rect x="9" y="9" width="11" height="11" rx="1" stroke="currentColor" fill="none" />
        <rect x="4" y="4" width="11" height="11" rx="1" stroke="currentColor" fill="none" />
    </symbol>

    <!-- 窗口控制 - 关闭 -->
    <symbol id="icon-close" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
        <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-linecap="round" />
        <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-linecap="round" />
    </symbol>

    <!-- 窗口控制 - 固定 (图钉) -->
    <symbol id="icon-pin" viewBox="0 0 640 640">
        <path d="M160 96C160 78.3 174.3 64 192 64L448 64C465.7 64 480 78.3 480 96C480 113.7 465.7 128 448 128L418.5 128L428.8 262.1C465.9 283.3 494.6 318.5 507 361.8L510.8 375.2C513.6 384.9 511.6 395.2 505.6 403.3C499.6 411.4 490 416 480 416L160 416C150 416 140.5 411.3 134.5 403.3C128.5 395.3 126.5 384.9 129.3 375.2L133 361.8C145.4 318.5 174 283.3 211.2 262.1L221.5 128L192 128C174.3 128 160 113.7 160 96zM288 464L352 464L352 576C352 593.7 337.7 608 320 608C302.3 608 288 593.7 288 576L288 464z" fill="currentColor" />
    </symbol>

    <!-- 窗口控制 - 取消固定 -->
    <symbol id="icon-pin-off" viewBox="0 0 640 640">
        <path d="M73 39.1C63.6 29.7 48.4 29.7 39.1 39.1C29.8 48.5 29.7 63.7 39 73.1L567 601.1C576.4 610.5 591.6 610.5 600.9 601.1C610.2 591.7 610.3 576.5 600.9 567.2L449.8 416L480 416C490 416 499.5 411.3 505.5 403.3C511.5 395.3 513.5 384.9 510.7 375.2L507 361.8C494.6 318.5 466 283.3 428.8 262.1L418.5 128L448 128C465.7 128 480 113.7 480 96C480 78.3 465.7 64 448 64L192 64C184.6 64 177.9 66.5 172.5 70.6L222.1 120.3L217.3 183.4L73 39.1zM314.2 416L181.7 283.6C159 304.1 141.9 331 133 361.9L129.2 375.3C126.4 385 128.4 395.3 134.4 403.4C140.4 411.5 150 416 160 416L314.2 416zM288 576C288 593.7 302.3 608 320 608C337.7 608 352 593.7 352 576L352 464L288 464L288 576z" fill="currentColor" opacity="0.45" />
    </symbol>

    <!-- 暂停图标 -->
    <symbol id="icon-pause" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
    </symbol>

    <!-- 播放图标 -->
    <symbol id="icon-play" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
    </symbol>

    <!-- 层叠图标（多引擎） -->
    <symbol id="icon-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
    </symbol>

    <!-- 书本图标（词典） -->
    <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </symbol>

    <!-- 脉冲图标（语音） -->
    <symbol id="icon-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </symbol>

    <!-- 剪贴板图标（历史） -->
    <symbol id="icon-clipboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="21" x2="9" y2="9"/>
    </symbol>

    <!-- 数据库缺失图标 -->
    <symbol id="icon-db-missing" viewBox="0 0 80 80" fill="none">
        <ellipse cx="40" cy="24" rx="26" ry="8" stroke="currentColor" stroke-width="2.5"/>
        <path d="M14 24v32c0 4.4 11.6 8 26 8s26-3.6 26-8V24" stroke="currentColor" stroke-width="2.5"/>
        <path d="M14 40c0 4.4 11.6 8 26 8s26-3.6 26-8" stroke="currentColor" stroke-width="2.5"/>
        <path d="M14 56c0 4.4 11.6 8 26 8s26-3.6 26-8" stroke="currentColor" stroke-width="2.5"/>
        <circle cx="58" cy="58" r="16" fill="var(--bg-card)" stroke="currentColor" stroke-width="2.5"/>
        <path d="M58 50v10M58 64v1" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
</svg>